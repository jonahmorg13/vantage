services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args: {}
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=BudgetApp_Docker;User Id=sa;Password=K5ev6Ce32BHLDymUFzTV;TrustServerCertificate=true
      - Jwt__SigningKey=DevOnly_SuperSecretKey_ChangeInProduction_AtLeast32Bytes!
      - Jwt__Issuer=BudgetApp
      - Jwt__Audience=BudgetApp
    depends_on:
      - sqlserver
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    ports:
      - "1444:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=K5ev6Ce32BHLDymUFzTV
    volumes:
      - sqlserver-docker-data:/var/opt/mssql
    restart: unless-stopped

volumes:
  sqlserver-docker-data:
