services:
  frontend:
    image: ghcr.io/jonahmorg13/budget-frontend:latest
    platform: linux/amd64
    ports:
      - "9100:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ghcr.io/jonahmorg13/budget-backend:latest
    platform: linux/amd64
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=BudgetApp;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=true
      - Jwt__SigningKey=${JWT_SIGNING_KEY}
      - Jwt__Issuer=BudgetApp
      - Jwt__Audience=BudgetApp
    depends_on:
      dacpac:
        condition: service_completed_successfully
    restart: unless-stopped

  dacpac:
    image: ghcr.io/jonahmorg13/budget-dacpac:latest
    platform: linux/amd64
    build:
      context: ./backend/Budget.Database
    command: >
      /TargetConnectionString:"Server=sqlserver,1433;Database=BudgetApp;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=true"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: "no"

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    ports:
      - "1444:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SA_PASSWORD}
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" -C -b -o /dev/null
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

volumes:
  sqlserver-data:
